<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingoTrack | Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Renk Paleti ve Genel Ayarlar */
        :root {
            --slate-950: #020617; 
            --slate-900: #0f172a; 
            --slate-800: #1e293b;
            --slate-700: #334155;
            --cyan-400: #22d3ee; 
            --cyan-500: #06b6d4; 
            --white: #f8fafc;
            --indigo-500: #6366f1;
            --indigo-600: #4f46e5;
        }
        
        /* Modern ve Tok Yazı Tipi Güncellemesi */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        }
        
        body { 
            background-color: var(--slate-950); 
            color: var(--white); 
            display: flex; 
            min-height: 100vh;
        }

        /* SIDEBAR STYLES */
        #sidebar {
            width: 260px; 
            height: 100vh; 
            background: var(--slate-900);
            position: fixed; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid var(--slate-800); 
            z-index: 1000; 
            overflow: hidden;
        }
        #sidebar.collapsed { width: 70px; }
        
        .sidebar-header { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 20px; 
        }
        
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--cyan-400); }
        #sidebar.collapsed .logo { display: none; }
        
        /* Yenilenen Premium Toggle Butonu */
        #toggleBtn { 
            background: var(--slate-800); 
            border: 1px solid var(--slate-700); 
            color: var(--cyan-400); 
            cursor: pointer; 
            font-size: 1.1rem; 
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s ease;
        }
        #toggleBtn:hover { 
            background: var(--slate-700); 
            transform: scale(1.05); 
            color: var(--white);
        }

        nav { padding: 10px; }
        nav a {
            display: flex; align-items: center; padding: 12px 15px; color: #94a3b8;
            text-decoration: none; border-radius: 8px; margin-bottom: 5px; transition: 0.3s;
        }
        nav a:hover, nav a.active { background: var(--slate-800); color: var(--cyan-400); }
        nav a i { min-width: 40px; font-size: 1.2rem; }
        #sidebar.collapsed span { display: none; }

        /* MAIN CONTENT VE KART TASARIMI */
        main { flex: 1; margin-left: 260px; padding: 40px; transition: 0.4s; display: flex; align-items: center; justify-content: center;}
        main.expanded { margin-left: 70px; }
        
        .welcome-card { 
            background: var(--slate-900); 
            padding: 50px 40px; 
            border-radius: 20px; 
            text-align: center; 
            max-width: 700px; 
            width: 100%;
            border: 1px solid var(--slate-800);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: var(--cyan-400); margin-bottom: 1.5rem; font-size: 2.2rem; }
        p { font-size: 1.1rem; line-height: 1.6; color: #cbd5e1; margin-bottom: 2.5rem; }
        
        /* Ana Sayfa Yönlendirme Butonları */
        .action-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 14px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-primary {
            background: var(--indigo-500);
            color: var(--white);
            border: none;
        }
        .btn-primary:hover {
            background: var(--indigo-600);
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(99, 102, 241, 0.4);
        }
        .btn-secondary {
            background: var(--slate-800);
            color: var(--cyan-400);
            border: 1px solid var(--slate-700);
        }
        .btn-secondary:hover {
            background: var(--slate-700);
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
            color: var(--cyan-500);
        }
        
        /* İmza */
        .signature { position: fixed; bottom: 12px; right: 24px; font-size: 0.75rem; color: rgba(255, 255, 255, 0.15); pointer-events: none; text-transform: uppercase; font-weight: 600; letter-spacing: 1px; }

        /* Mobil Uyumluluk */
        @media (max-width: 768px) {
            #sidebar { width: 70px; } 
            main { margin-left: 70px; padding: 20px; }
            .logo, nav a span { display: none; }
            .action-buttons { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
            .welcome-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <aside id="sidebar">
        <div class="sidebar-header">
            <div class="logo">LingoTrack</div>
            <button id="toggleBtn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
        </div>
        <nav>
            <a href="index.html" class="active"><i class="fa-solid fa-house"></i> <span>Home</span></a>
            <a href="vault.html"><i class="fa-solid fa-vault"></i> <span>Vault</span></a>
            <a href="analysis.html"><i class="fa-solid fa-tv"></i> <span>Friends Room</span></a>
        </nav>
    </aside>

    <main>
        <div class="welcome-card">
            <h1>Welcome to LingoTrack</h1>
            <p>Dostum, dil öğrenme macerasına hoş geldin. Her şey hazır; replikleri parçalamak için Friends Room'a geçebilir veya daha önce öğrendiklerini incelemek için doğrudan kasayı açabilirsin.</p>
            
            <div class="action-buttons">
                <a href="analysis.html" class="btn btn-primary">
                    <i class="fa-solid fa-tv"></i> Friends Room
                </a>
                <a href="vault.html" class="btn btn-secondary">
                    <i class="fa-solid fa-vault"></i> Open Vault
                </a>
            </div>
        </div>
    </main>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const main = document.querySelector('main');
            sidebar.classList.toggle('collapsed');
            if(main) main.classList.toggle('expanded');
            localStorage.setItem('sidebarStatus', sidebar.classList.contains('collapsed') ? 'closed' : 'open');
        }

        document.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('sidebarStatus') === 'closed') toggleSidebar();
            const sig = document.createElement('div');
            sig.className = 'signature'; sig.innerText = 'DESIGNED BY ECY';
            document.body.appendChild(sig);
        });
    </script>
</body>
</html>
